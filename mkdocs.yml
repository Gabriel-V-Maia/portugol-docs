site_name: Portugol
site_description: Guia em como programar portugol!
site_url: https://Gabriel-V-Maia.github.io/portugol-docs/
theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Instrument Sans
    code: JetBrains Mono
  logo: assets/LOGO.png
  favicon: assets/LOGO.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
extra_css:
  - assets/css/custom.css
nav:
  - Início: index.md
  - Começando:
      - Instalação: instalacao.md
      - Primeiro Programa: primeiro-programa.md
  - Referência:
      - Sintaxe: referencia/sintaxe.md
      - Interpolação: referencia/interpolacao.md
      - Tipos de Dados: referencia/tipos.md
      - Funções: referencia/funcoes.md
      - Controle de Fluxo: referencia/controle.md
      - Expressões: referencia/expressoes.md
  - Exemplos:
      - Fibonacci: exemplos/fibonacci.md
      - Fatorial: exemplos/fatorial.md
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
plugins:
  - search:
      lang: pt
